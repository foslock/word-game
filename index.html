<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Theme Words</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header id="header">
        <div class="header-left">
          <button id="rules-btn" class="icon-btn" title="How to play">?</button>
        </div>
        <h1>Theme Words</h1>
        <div class="header-right">
          <button id="stats-btn" class="icon-btn" title="Statistics">📊</button>
        </div>
      </header>

      <main id="game-container"></main>
    </div>

    <!-- Modal backdrop -->
    <div id="modal-backdrop" class="hidden"></div>

    <!-- Rules modal -->
    <div id="rules-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="How to play">
      <div class="modal-content">
        <button class="modal-close" data-close="rules-modal">✕</button>
        <h2>How to Play</h2>
        <div class="rules-body" id="rules-body"></div>
      </div>
    </div>

    <!-- Stats modal -->
    <div id="stats-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Statistics">
      <div class="modal-content">
        <button class="modal-close" data-close="stats-modal">✕</button>
        <h2>Statistics</h2>
        <div id="stats-body"></div>
      </div>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast hidden"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
